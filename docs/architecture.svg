<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a949e"/>
    </marker>
    <style>
      .t{fill:#1f2933}.sub{fill:#5b6670}.mut{fill:#8a949e}
      .h{font-weight:700}.card-t{font-weight:700}
      .lead{font-style:italic}
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="900" fill="#fbfbf9"/>

  <!-- Header -->
  <text x="60" y="58" class="t h" font-size="34">ChatCut口播 · 增量层框架</text>
  <text x="60" y="92" class="sub" font-size="18">官方 ChatCut skill 教「工具怎么用」；本包只补官方不说的那句 ——「剪成什么样才算好」</text>

  <!-- Legend -->
  <g font-size="15" class="sub">
    <rect x="838" y="44" width="16" height="16" rx="4" fill="#d8ded0" stroke="#8ea06f"/>
    <text x="860" y="57">官方底座</text>
    <rect x="948" y="44" width="16" height="16" rx="4" fill="#d9efec" stroke="#2fa39a"/>
    <text x="970" y="57">增量四大件</text>
    <rect x="1088" y="44" width="16" height="16" rx="4" fill="#f6e6d6" stroke="#c8702f"/>
    <text x="1110" y="57">门禁 · 自维护</text>
  </g>

  <!-- Base band: official ChatCut -->
  <rect x="60" y="122" width="1160" height="82" rx="14" fill="#eef1e7" stroke="#8ea06f" stroke-width="1.5"/>
  <text x="88" y="156" class="t card-t" font-size="21">官方 ChatCut Skill 底座（15 件官方）</text>
  <text x="88" y="184" class="sub" font-size="15.5">工具怎么用 · 命令与参数 · 时间线操作 —— 本包一律路由官方，不重复造轮子</text>
  <text x="1192" y="170" class="mut" font-size="30" text-anchor="end">⚙</text>

  <!-- connector base -> increment -->
  <path d="M640,204 L640,238" stroke="#8a949e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="656" y="228" class="mut lead" font-size="14">本包在其上做增量</text>

  <!-- Section label -->
  <text x="60" y="266" class="sub h" font-size="16">四大件 · 代理「剪成什么样算好」的决策规则（皆来自 11 支直播切片 × 多轮返工实测）</text>

  <!-- Four cards -->
  <!-- card geometry: x=60,357,654,951 ; w=269 ; y=284 h=210 -->
  <g font-size="14.5">
    <!-- 1 dual-frame -->
    <rect x="60" y="284" width="269" height="212" rx="14" fill="#e6f4f2" stroke="#2fa39a" stroke-width="1.6"/>
    <text x="80" y="318" class="t card-t" font-size="19">① 双画面版式</text>
    <line x1="80" y1="330" x2="309" y2="330" stroke="#bfe0dc"/>
    <text x="80" y="356" class="sub">录屏 1 ＋ 主讲人 2</text>
    <text x="80" y="380" class="sub">横竖版 8 套坐标</text>
    <text x="80" y="404" class="sub">圆窗 / 画中画</text>
    <text x="80" y="470" class="mut lead" font-size="13.5">治：被裁成叶片形</text>

    <!-- 2 theme -->
    <rect x="357" y="284" width="269" height="212" rx="14" fill="#e6f4f2" stroke="#2fa39a" stroke-width="1.6"/>
    <text x="377" y="318" class="t card-t" font-size="19">② 主题配色</text>
    <line x1="377" y1="330" x2="606" y2="330" stroke="#bfe0dc"/>
    <text x="377" y="356" class="sub">8 套主题 · 对比档位</text>
    <text x="377" y="380" class="sub">每套带代理 playbook</text>
    <text x="377" y="404" class="sub">色板＝可执行设计系统</text>
    <text x="377" y="470" class="mut lead" font-size="13.5">治：配色全靠猜</text>

    <!-- 3 motion -->
    <rect x="654" y="284" width="269" height="212" rx="14" fill="#e6f4f2" stroke="#2fa39a" stroke-width="1.6"/>
    <text x="674" y="318" class="t card-t" font-size="19">③ 过渡动效工程</text>
    <line x1="674" y1="330" x2="903" y2="330" stroke="#bfe0dc"/>
    <text x="674" y="356" class="sub">四档可靠性链 · 端点契约</text>
    <text x="674" y="380" class="sub">fps 归一化</text>
    <text x="674" y="404" class="sub">块级动效词汇表（三轴）</text>
    <text x="674" y="470" class="mut lead" font-size="13.5">治：动画凭空消失 0.2s</text>

    <!-- 4 face -->
    <rect x="951" y="284" width="269" height="212" rx="14" fill="#e6f4f2" stroke="#2fa39a" stroke-width="1.6"/>
    <text x="971" y="318" class="t card-t" font-size="19">④ 人脸取景</text>
    <line x1="971" y1="330" x2="1200" y2="330" stroke="#bfe0dc"/>
    <text x="971" y="356" class="sub">三层合成</text>
    <text x="971" y="380" class="sub">reframe → mask 顺序</text>
    <text x="971" y="404" class="sub">坐标系陷阱 · overscan 公式</text>
    <text x="971" y="470" class="mut lead" font-size="13.5">治：黑边反复修不掉</text>
  </g>

  <!-- connectors four -> gate row -->
  <path d="M194,496 L194,548" stroke="#8a949e" stroke-width="1.4" marker-end="url(#ar)"/>
  <path d="M491,496 L640,548" stroke="#8a949e" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M788,496 L640,548" stroke="#8a949e" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  <path d="M1086,496 L1086,548" stroke="#8a949e" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- Gate + self-maintain row -->
  <g font-size="14.5">
    <!-- 词表模板 (self maintain, left) -->
    <rect x="60" y="550" width="537" height="96" rx="14" fill="#f6e6d6" stroke="#c8702f" stroke-width="1.5"/>
    <text x="82" y="584" class="t card-t" font-size="18">词表模板 · 可自维护</text>
    <text x="82" y="612" class="sub">terminology.template.json —— 字幕术语纠错的唯一维护点，喂给字幕层</text>
    <text x="82" y="634" class="mut lead" font-size="13.5">治：专有名词一错到底</text>

    <!-- 字幕门禁 (machine gate, right) -->
    <rect x="683" y="550" width="537" height="96" rx="14" fill="#f6e6d6" stroke="#c8702f" stroke-width="1.5"/>
    <text x="705" y="584" class="t card-t" font-size="18">字幕门禁 · 机器验收</text>
    <text x="705" y="612" class="sub">validate-caption-pages.mjs —— 两行挤压 / 越界 / 气口断错自动拦</text>
    <text x="705" y="634" class="mut lead" font-size="13.5">治：字幕两行挤压</text>
  </g>

  <!-- connector gate -> acceptance -->
  <path d="M640,646 L640,690" stroke="#8a949e" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- Acceptance triad -->
  <text x="60" y="712" class="sub h" font-size="16">验收三象 · 以最终画面为准（ChatCut 当作可继续手工调整的非线性编辑器）</text>
  <g font-size="17" class="card-t">
    <rect x="60" y="726" width="366" height="70" rx="35" fill="#e4f3e8" stroke="#3f9d5c" stroke-width="1.6"/>
    <text x="243" y="769" class="t" text-anchor="middle">👁 可见画面</text>
    <rect x="457" y="726" width="366" height="70" rx="35" fill="#e4f3e8" stroke="#3f9d5c" stroke-width="1.6"/>
    <text x="640" y="769" class="t" text-anchor="middle">🔊 可听声音</text>
    <rect x="854" y="726" width="366" height="70" rx="35" fill="#e4f3e8" stroke="#3f9d5c" stroke-width="1.6"/>
    <text x="1037" y="769" class="t" text-anchor="middle">📝 可读字幕</text>
  </g>

  <!-- footer -->
  <text x="60" y="852" class="mut" font-size="14">宿主：Codex / WorkBuddy / TRAE 等 ChatCut 代理 · 方法来源已在 CHANGELOG 逐条署名（只吸收组织方法，文本与取舍为本包自定）</text>
  <text x="60" y="876" class="mut" font-size="13">ChatCut口播 · 马甲实战版 · v1.3.1 · slug: majia-chatcut-koubo</text>
</svg>
